<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora Piques</title>
    <link rel="icon" type="image/png" href="icon.png">
    <!-- PWA -->
    <link rel="manifest" href="./manifest.json">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Piques">
    <meta name="theme-color" content="#0f1117">
    <link rel="apple-touch-icon" href="icon.png">
    <style>
        /* ── TOKENS ──────────────────────────────────────────── */
        :root {
            --bg:        #0f1117;
            --surface:   #181c27;
            --card:      #1e2336;
            --border:    #2a3050;
            --muted:     #3a4060;

            --pelota:    #10b981;   /* esmeralda */
            --pelota-d:  #059669;
            --pelota-bg: #0d2e24;

            --futbol:    #6366f1;   /* índigo */
            --futbol-d:  #4f46e5;
            --futbol-bg: #1a1a3e;

            --ganado:    #10b981;
            --perdido:   #f43f5e;
            --balance-p: #34d399;   /* positivo */
            --balance-n: #fb7185;   /* negativo */

            --text:      #e2e8f0;
            --text-dim:  #94a3b8;
            --accent:    #f59e0b;   /* ámbar para el descuento */

            --radius:    14px;
            --radius-sm: 8px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Segoe UI', system-ui, Arial, sans-serif;
            background: var(--bg);
            min-height: 100vh;
            padding: 32px 16px 60px;
            color: var(--text);
        }

        /* ── CABECERA ────────────────────────────────────────── */
        .app-header {
            text-align: center;
            margin-bottom: 32px;
        }

        .app-header h1 {
            font-size: 1.05rem;
            font-weight: 800;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: var(--text);
            white-space: nowrap;
        }

        .app-header p {
            font-size: 0.78rem;
            color: var(--text-dim);
            letter-spacing: 1.5px;
            margin-top: 4px;
            text-transform: uppercase;
        }

        /* ── LAYOUT ──────────────────────────────────────────── */
        .tablas-wrapper {
            display: flex;
            flex-direction: column;
            gap: 28px;
            max-width: 580px;
            margin: 0 auto;
        }

        /* ── CARD ────────────────────────────────────────────── */
        .card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            overflow: hidden;
            box-shadow: 0 8px 32px rgba(0,0,0,0.45);
        }

        .card-titulo {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            font-size: 0.95rem;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
            padding: 14px 18px;
            border-bottom: 1px solid var(--border);
        }

        .card-pelota .card-titulo {
            background: var(--pelota-bg);
            color: var(--pelota);
            border-bottom-color: var(--pelota-d);
        }

        .card-futbol .card-titulo {
            background: var(--futbol-bg);
            color: var(--futbol);
            border-bottom-color: var(--futbol-d);
        }

        .card-titulo .dot {
            width: 8px; height: 8px;
            border-radius: 50%;
            display: inline-block;
        }
        .card-pelota .dot { background: var(--pelota); box-shadow: 0 0 8px var(--pelota); }
        .card-futbol .dot { background: var(--futbol); box-shadow: 0 0 8px var(--futbol); }

        /* ── TABLA ───────────────────────────────────────────── */
        table {
            width: 100%;
            border-collapse: collapse;
        }

        thead th {
            padding: 10px 12px;
            font-size: 0.72rem;
            font-weight: 700;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            color: var(--text-dim);
            background: var(--surface);
            text-align: center;
            border-bottom: 1px solid var(--border);
        }

        thead th:first-child { color: var(--ganado); }
        thead th:last-child  { color: var(--perdido); }

        tbody td {
            border-bottom: 1px solid var(--border);
            padding: 10px 12px;
            text-align: center;
            font-size: 0.92rem;
            color: var(--text);
            background: var(--card);
            transition: background 0.15s;
        }

        tbody tr:last-child td { border-bottom: none; }

        tbody td[contenteditable="true"]:focus {
            outline: none;
            background: #252d45;
            color: #fff;
        }

        /* ── TFOOT ───────────────────────────────────────────── */
        tfoot { border-top: 1px solid var(--border); }

        tfoot td {
            padding: 9px 12px;
            text-align: center;
            font-size: 0.82rem;
            border-bottom: 1px solid var(--border);
        }

        tfoot tr:last-child td { border-bottom: none; }

        /* Fila descuento */
        .fila-descuento td {
            background: #1c1a0e;
            color: var(--accent);
            font-size: 0.78rem;
            font-style: italic;
        }

        /* Fila totales */
        .fila-total td {
            background: var(--surface);
            font-weight: 700;
            font-size: 0.86rem;
        }

        .fila-total td:first-child { color: var(--ganado); }
        .fila-total td:last-child  { color: var(--perdido); }

        /* Fila balance */
        .fila-balance td {
            font-weight: 800;
            font-size: 0.9rem;
            letter-spacing: 0.5px;
            padding: 11px 12px;
            border-top: 1px solid var(--muted);
        }

        .fila-balance .balance-label {
            font-size: 0.72rem;
            font-weight: 600;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            color: var(--text-dim);
        }

        .balance-positivo { color: var(--balance-p); }
        .balance-negativo { color: var(--balance-n); }
        .balance-cero     { color: var(--text-dim); }

        /* Fila balance: span toda la fila */
        .fila-balance td { background: #12151f; }

        /* ── BOTONES ─────────────────────────────────────────── */
        .botones {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            padding: 14px 16px;
            background: var(--surface);
            border-top: 1px solid var(--border);
            justify-content: center;
        }

        .botones button {
            flex: 1 1 90px;
            min-width: 88px;
            max-width: 150px;
            padding: 9px 10px;
            border: none;
            border-radius: var(--radius-sm);
            cursor: pointer;
            font-weight: 700;
            font-size: 0.8rem;
            letter-spacing: 0.5px;
            color: #fff;
            transition: filter 0.2s, transform 0.1s;
            white-space: nowrap;
        }

        .botones button:hover  { filter: brightness(1.15); }
        .botones button:active { transform: scale(0.96); }

        .btn-agregar  { background: var(--muted); }
        .btn-guardar  { background: #2563eb; }
        .btn-eliminar { background: #be123c; }

        /* ── RESPONSIVE ──────────────────────────────────────── */
        @media (max-width: 360px) {
            .botones button { font-size: 0.72rem; padding: 8px 6px; min-width: 76px; }
        }

        /* ── LOGIN OVERLAY ───────────────────────────────────── */
        #loginOverlay {
            position: fixed;
            inset: 0;
            background: var(--bg);
            z-index: 9999;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }

        .login-box {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 36px 28px 32px;
            width: 100%;
            max-width: 340px;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0,0,0,0.6);
        }

        .login-logo { font-size: 2.4rem; margin-bottom: 12px; }

        .login-box h2 {
            font-size: 1rem;
            font-weight: 800;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--text);
            margin-bottom: 4px;
        }

        .login-box p {
            font-size: 0.75rem;
            color: var(--text-dim);
            letter-spacing: 1px;
            margin-bottom: 28px;
        }

        #loginInput {
            width: 100%;
            padding: 13px 16px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            color: var(--text);
            font-size: 1rem;
            letter-spacing: 2px;
            text-align: center;
            outline: none;
            transition: border-color 0.2s;
            margin-bottom: 14px;
        }

        #loginInput:focus { border-color: var(--pelota); }

        #loginInput.error {
            border-color: var(--perdido);
            animation: shake 0.35s ease;
        }

        @keyframes shake {
            0%,100% { transform: translateX(0); }
            25%      { transform: translateX(-8px); }
            75%      { transform: translateX(8px); }
        }

        #loginBtn {
            width: 100%;
            padding: 13px;
            background: var(--pelota);
            color: #fff;
            border: none;
            border-radius: var(--radius-sm);
            font-size: 0.9rem;
            font-weight: 700;
            letter-spacing: 1px;
            cursor: pointer;
            transition: filter 0.2s;
        }

        #loginBtn:hover { filter: brightness(1.12); }

        #loginError {
            font-size: 0.75rem;
            color: var(--perdido);
            margin-top: 10px;
            min-height: 16px;
        }
    </style>
</head>
<body>

    <!-- ── LOGIN OVERLAY ── -->
    <div id="loginOverlay">
        <div class="login-box">
            <div class="login-logo">⚾⚽</div>
            <h2>Calculadora Piques</h2>
            <p>Ingresa la contraseña para continuar</p>
            <input id="loginInput" type="password" placeholder="••••••••••" autocomplete="current-password" />
            <button id="loginBtn" onclick="verificarClave()">Entrar</button>
            <div id="loginError"></div>
        </div>
    </div>

    <header class="app-header">
        <h1>⚾ Calculadora Piques ⚽</h1>
        <p>Control de resultados</p>
    </header>

    <div class="tablas-wrapper">

        <!-- ── PELOTA ── -->
        <div class="card card-pelota">
            <div class="card-titulo">
                <span class="dot"></span>
                Baseball
                <span class="dot"></span>
            </div>
            <table>
                <thead>
                    <tr>
                        <th>Ganado</th>
                        <th>Perdido</th>
                    </tr>
                </thead>
                <tbody id="cuerpoPelota"></tbody>
                <tfoot>
                    <tr class="fila-descuento">
                        <td></td>
                        <td>Descuento 10 %: <strong id="pctValPelota">0.00</strong></td>
                    </tr>
                    <tr class="fila-total">
                        <td>Neto: <strong id="totalGPelota">0.00</strong></td>
                        <td>Total: <strong id="totalPPelota">0.00</strong></td>
                    </tr>
                    <tr class="fila-balance">
                        <td colspan="2">
                            <span class="balance-label">Balance &nbsp;</span>
                            <span id="balancePelota" class="balance-cero">0.00</span>
                        </td>
                    </tr>
                </tfoot>
            </table>
            <div class="botones">
                <button class="btn-agregar"  onclick="agregarFila('pelota')">+ Agregar</button>
                <button class="btn-guardar"  onclick="guardarDatos('pelota')">Guardar</button>
                <button class="btn-eliminar" onclick="eliminarFila('pelota')">✕ Eliminar</button>
            </div>
        </div>

        <!-- ── FÚTBOL ── -->
        <div class="card card-futbol">
            <div class="card-titulo">
                <span class="dot"></span>
                Fútbol
                <span class="dot"></span>
            </div>
            <table>
                <thead>
                    <tr>
                        <th>Ganado</th>
                        <th>Perdido</th>
                    </tr>
                </thead>
                <tbody id="cuerpoFutbol"></tbody>
                <tfoot>
                    <tr class="fila-descuento">
                        <td></td>
                        <td>Descuento 20 %: <strong id="pctValFutbol">0.00</strong></td>
                    </tr>
                    <tr class="fila-total">
                        <td>Neto: <strong id="totalGFutbol">0.00</strong></td>
                        <td>Total: <strong id="totalPFutbol">0.00</strong></td>
                    </tr>
                    <tr class="fila-balance">
                        <td colspan="2">
                            <span class="balance-label">Balance &nbsp;</span>
                            <span id="balanceFutbol" class="balance-cero">0.00</span>
                        </td>
                    </tr>
                </tfoot>
            </table>
            <div class="botones">
                <button class="btn-agregar"  onclick="agregarFila('futbol')">+ Agregar</button>
                <button class="btn-guardar"  onclick="guardarDatos('futbol')">Guardar</button>
                <button class="btn-eliminar" onclick="eliminarFila('futbol')">✕ Eliminar</button>
            </div>
        </div>

    </div>

    <script>
    // ── LOGIN ─────────────────────────────────────────────────
    const LOGIN_KEY = 'calcPiques_auth';
    const CLAVE     = 'slpt2020#';

    function estaAutenticado() {
        try {
            return localStorage.getItem(LOGIN_KEY) === '1' ||
                   sessionStorage.getItem(LOGIN_KEY) === '1';
        } catch(e) { return false; }
    }
    function guardarAuth() {
        try { localStorage.setItem(LOGIN_KEY, '1'); } catch(e) {}
        try { sessionStorage.setItem(LOGIN_KEY, '1'); } catch(e) {}
    }

    function verificarClave() {
        const input = document.getElementById('loginInput');
        const err   = document.getElementById('loginError');
        if (input.value === CLAVE) {
            guardarAuth();
            document.getElementById('loginOverlay').style.display = 'none';
            err.textContent = '';
        } else {
            input.classList.remove('error');
            void input.offsetWidth;
            input.classList.add('error');
            err.textContent = 'Contraseña incorrecta.';
            input.value = '';
            input.focus();
        }
    }

    document.getElementById('loginInput').addEventListener('keydown', e => {
        if (e.key === 'Enter') verificarClave();
    });

    if (estaAutenticado()) {
        document.getElementById('loginOverlay').style.display = 'none';
    } else {
        setTimeout(() => document.getElementById('loginInput').focus(), 100);
    }
    // ──────────────────────────────────────────────────────────

    const CFG = {
        pelota: { pct: 10, key: 'calcPiques_pelota' },
        futbol: { pct: 20, key: 'calcPiques_futbol' }
    };

    function calcular(dep) {
        const tbody = document.getElementById(dep === 'pelota' ? 'cuerpoPelota' : 'cuerpoFutbol');
        let sumaG = 0, sumaP = 0;

        tbody.querySelectorAll('tr').forEach(tr => {
            sumaG += parseFloat(tr.querySelector('.celda-ganado')?.innerText)  || 0;
            sumaP += parseFloat(tr.querySelector('.celda-perdido')?.innerText) || 0;
        });

        const descuento = (sumaP * CFG[dep].pct) / 100;
        const neto      = sumaP - descuento;
        const balance   = sumaG - sumaP;

        const sfx = dep === 'pelota' ? 'Pelota' : 'Futbol';

        document.getElementById('pctVal'   + sfx).innerText = descuento.toFixed(2);
        document.getElementById('totalG'   + sfx).innerText = sumaG.toFixed(2);
        document.getElementById('totalP'   + sfx).innerText = neto.toFixed(2);

        const balEl = document.getElementById('balance' + sfx);
        balEl.innerText = (balance >= 0 ? '+' : '') + balance.toFixed(2);
        balEl.className = balance > 0
            ? 'balance-positivo'
            : balance < 0
                ? 'balance-negativo'
                : 'balance-cero';
    }

    function agregarFila(dep, gan = '', per = '') {
        const tbody = document.getElementById(dep === 'pelota' ? 'cuerpoPelota' : 'cuerpoFutbol');
        const tr = document.createElement('tr');
        tr.innerHTML = `
            <td contenteditable="true" class="celda-ganado">${gan}</td>
            <td contenteditable="true" class="celda-perdido">${per}</td>
        `;
        tbody.appendChild(tr);
        calcular(dep);
    }

    function eliminarFila(dep) {
        const tbody = document.getElementById(dep === 'pelota' ? 'cuerpoPelota' : 'cuerpoFutbol');
        const ultima = tbody.lastElementChild;
        if (ultima) { tbody.removeChild(ultima); calcular(dep); }
        else alert('No hay filas para eliminar.');
    }

    function guardarDatos(dep) {
        const tbody = document.getElementById(dep === 'pelota' ? 'cuerpoPelota' : 'cuerpoFutbol');
        const filas = [];
        tbody.querySelectorAll('tr').forEach(tr => {
            filas.push({
                gan: tr.querySelector('.celda-ganado').innerText,
                per: tr.querySelector('.celda-perdido').innerText
            });
        });
        localStorage.setItem(CFG[dep].key, JSON.stringify(filas));
        alert(`Datos de ${dep === 'pelota' ? 'Baseball' : 'Fútbol'} guardados.`);
    }

    function cargarDatos(dep) {
        const guardado = localStorage.getItem(CFG[dep].key);
        if (guardado) {
            JSON.parse(guardado).forEach(f => agregarFila(dep, f.gan, f.per));
        } else {
            agregarFila(dep);
            agregarFila(dep);
        }
    }

    ['cuerpoPelota', 'cuerpoFutbol'].forEach(id => {
        document.getElementById(id).addEventListener('input', () => {
            calcular(id === 'cuerpoPelota' ? 'pelota' : 'futbol');
        });
    });

    cargarDatos('pelota');
    cargarDatos('futbol');

    // Registro del Service Worker (PWA offline)
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./service-worker.js')
          .catch(err => console.warn('SW no registrado:', err));
      });
    }
    </script>
</body>
</html>
